version: "3.9"

# Fed0gaT – CTI Scraper + Web Dashboard
#
# Copy .env.example to .env and fill in GH_TOKEN, GH_REPO, WEB_SECRET.
#
# Start:    docker compose up -d
# Scrape now (one-shot): docker compose run --rm scraper
# Logs:     docker compose logs -f

services:

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    image: fed0gat-web
    container_name: fed0gat-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      GH_TOKEN:   "${GH_TOKEN}"
      GH_REPO:    "${GH_REPO}"
      DATA_DIR:   "${DATA_DIR:-feeds}"
      WEB_SECRET: "${WEB_SECRET:-change-me-in-production}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Scraper (one-shot; scheduled externally via cron or GitHub Actions) ──────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: fed0gat-scraper
    container_name: fed0gat-scraper
    # profiles: ["scraper"] – uncomment to keep it out of `docker compose up`
    environment:
      GH_TOKEN:   "${GH_TOKEN}"
      GH_REPO:    "${GH_REPO}"
      DATA_DIR:   "${DATA_DIR:-feeds}"
      GIT_NAME:   "${GIT_NAME:-Fed0gaT Bot}"
      GIT_EMAIL:  "${GIT_EMAIL:-bot@fed0gat.local}"
      DRY_RUN:    "${DRY_RUN:-0}"
    # Run once and exit – schedule with host cron (see below) or GitHub Actions
    restart: "no"

# ── Host cron example (add to `crontab -e` on the Docker host) ────────────────
# 0 * * * * docker compose -f /path/to/Fed0gaT/docker-compose.yml run --rm scraper
